name: Checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -c requirements/analysis.txt -e ".[dev,neural,notebook]"
      - run: python -m pip check
      - run: python -m ruff format --check .
      - run: python -m ruff check .
      - run: python -m mypy src scripts/smoke_test_model.py
      - run: python -m scripts.verify_artifacts
      - name: Execute public comparison notebook
        run: >-
          jupyter nbconvert --to notebook --execute
          notebooks/model_comparison_demo.ipynb
          --output-dir /tmp
          --ExecutePreprocessor.timeout=180
      - run: python -m pytest -q

  model-smoke:
    name: Published model smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[app,model-runtime]"
      - run: python -m pip check
      - run: python -c "import app"
      - run: python -m scripts.verify_artifacts
      - run: python -m scripts.smoke_test_model
